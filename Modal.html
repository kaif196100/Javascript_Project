<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: cursive;
        }

        .hero {
            height: 100vh;
            background: url(hero.jpeg) center/cover no-repeat;
            display: grid;
            place-items: center;
        }

        .banner {
            background: #fff;
            padding: 4rem 2rem;
            border-radius: 0.5rem;
            text-align: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(238, 215, 215, 0.1);
            width: 90vw;
            max-width: 500px;
            margin: 0 auto;

        }

        .modal-btn {
            margin-top: 2rem;
            background: #49a6e9;
            border-color: #49a6e9;
            color: #fff;
            border-radius: 0.25rem;
            padding: 0.8rem 2rem;
            font-size: 11.rem;
            cursor: pointer;
        }

        .modal-btn:hover {
            background: transparent;
            color: #49a6e9;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(73, 166, 233, 0.5);
            display: grid;
            place-items: center;
            transition: all 0.3s linear;
            visibility: hidden;
            z-index: -10;

        }

        /* open/close modal */
        .open-modal {
            visibility: visible;
            z-index: 10;
        }

        .modal-container {
            background: #fff;
            border-radius: 0.5rem;
            width: 90vw;
            height: 30vh;
            max-width: 1170px;
            text-align: center;
            display: grid;
            place-items: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 2rem;
            background: transparent;
            border-color: transparent;
            color: red;
            cursor: pointer;
            transition: all 0.3s linear;
        }

        .close-btn:hover {
            color: red;
            transform: scale(1.3);
        }
    </style>
</head>

<body>
    <!-- hero -->
    <header class="hero">
        <div class="banner">
            <h1>modal project</h1>
            <button class="btn modal-btn">
                open modal
            </button>
        </div>
    </header>
    <!-- end of hero -->
    <!-- modal -->
    <div class="modal-overlay">
        <div class="modal-container">
            <h3>modal content</h3>
            <button class="close-btn">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <script>
        // select modal-btn,modal-overlay,cloe-btn
        //listen for click events on modal-btn and close -btn
        //when user click modal-btn add .open-modal to modal-overlay
        //when user click close-btn remove .OPNE-MODALfrom modal-overlay

        const modalBtn = document.querySelector('.modal-btn');
        const modal = document.querySelector('.modal-overlay');
        const closeBtn = document.querySelector('.close-btn');

        modalBtn.addEventListener('click', function () {
            modal.classList.add("open-modal")
        })
        closeBtn.addEventListener('click', function () {
            modal.classList.remove("open-modal")
        })

    </script>
</body>

</html>
