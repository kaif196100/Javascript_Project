<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blurrd Backgrount Popup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: center;
            background: url(images\ \(1\).jfif);
            background-size: cover;
            text-align: center;
            transition: filter 0.7s;
        }

        h1 {
            font-family: 'Courier New', Courier, monospace;
            font-size: 60px;
            color: white;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .btn {
            padding: 10px 20px;
            width: 200px;
            cursor: pointer;
            background-color: white;
            color: black;
            border: none;
            border-radius: 5px;
            font-size: 20px;
        }

        .btn:hover {
            filter: brightness(0.8);
        }

        .active.container {
            filter: blur(5px) brightness(0.7);
        }

        .popup-container {
            position: fixed;
            left: 50%;
            width: 400px;
            height: 200px;
            top: 30%;
            transform: translate(-50%);
            background-color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            opacity: 1;
            transition: all 0.7s;
        }
        h4{
            font-size: 30px;
            margin: 10px 0;
            font-family: cursive;
            color: blueviolet;
        }
        label{
            color: blueviolet;
            font-family: 'Courier New', Courier, monospace;
        }
        .popup-btn{
            background-color: black;
            color: white;
            padding: 10px;
            font-size: 20px;
            cursor: pointer;
            border: 2px solid;
        }  
        .input{
            border: 2px solid;
            padding: 10px;
            margin: 10px 0;
            font-size: 20px;
            text-align: center; 
        }
        .input::placeholder{
            color: lightgrey;
        }
        .close-icon{
            position: absolute;
            right: 20px;
            cursor: pointer;
        }
        .close-icon:hover{
            color: black;
        }
        .active.popup-container{
            visibility: hidden;
            opacity: 0;
            top: 10%;
        }
    </style>
</head>

<body>
    <div class="container ">
        <h1>Welcome to our website</h1>
        <button class="btn">Click to join</button>
    </div>
    <div class="popup-container active">
        <h4>20% OFF Offer</h4>
        <label for="email">Your Email</label>
        <input type="email" name="email" class="input" placeholder="Enter Your Email ">
        <button class="popup-btn">Join</button>
        <div class="close-icon">
            <i class="fa-sharp fa-solid fa-xmark"></i><!--icon-->
        </div>
    </div>
    <script>
        const containerEl = document.querySelector(".container");
        const btnEl = document.querySelector(".btn");
        const popupContainerEl = document.querySelector(".popup-container");
        const closeIconEl = document.querySelector(".close-icon");

        btnEl.addEventListener("click", ()=>{
            containerEl.classList.add("active");
            popupContainerEl.classList.remove("active");
        });

        closeIconEl.addEventListener("click", ()=>{
            containerEl.classList.remove("active");
            popupContainerEl.classList.add("active");
        });

    </script>
</body>

</html>
