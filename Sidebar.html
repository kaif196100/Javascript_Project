<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* Reset & Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Arial', sans-serif;
    /* overflow-x: hidden; */
} 

/* Sidebar Toggle Button */
.sidebar-toggle {
    position: fixed;
    top: 2rem;
    right: 3rem;
    font-size: 2rem;
    background: transparent;
    border: none;
    color: aqua;
    transition: all 0.3s linear;
    cursor: pointer;
    /* z-index: 1001; */
    animation: bounce 2s ease-in-out infinite;
}

.sidebar-toggle:hover {
    color: aquamarine;
    transform: scale(1.1);
}

@keyframes bounce {
    0%, 100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.5);
    }
} 

/* Sidebar Main Container */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: #46a9e9/*linear-gradient(135deg, #667eea 0%, #764ba2 100%)*/;
    transform: translateX(-100%);
    transition: all 0.3s /*cubic-bezier(0.68, -0.55, 0.265, 1.55)*/;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    padding: 2rem;
}

.show-sidebar {
    transform: translateX(0);
} 

/* Sidebar Header */
.sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3rem;
}

.logo {
    height: 60px;
    width: auto;
    border-radius: 20%;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.close-btn {
    font-size: 2rem;
    background: transparent;
    border: none;
    color: black;
    transition: all 0.3s linear;
    cursor: pointer;
}

.close-btn:hover {
    color: rgb(82, 78, 78);
    transform: rotate(65deg) scale(1.2);
} 

/* Navigation Links */
.links {
    list-style: none;
    flex: 1;
}

.links a {
    display: block;
    font-size: 1.8rem;
    text-transform: uppercase;
    padding: 1.5rem 2rem;
    color: #fff;
    text-decoration: none;
    transition: all 0.3s ease;
    border-radius: 10px;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
}

.links a::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.2);
    transition: left 0.3s ease;
}

.links a:hover::before {
    left: 0;
}

.links a:hover {
    background: rgba(255,255,255,0.2);
    transform: translateX(10px);
    color: #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
} 

/* Social Icons */
.social-icons {
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(255,255,255,0.2);
    list-style: none;
}

.social-icons a {
    font-size: 2rem;
    color: #fff;
    transition: all 0.3s ease;
    padding: 1rem;
    border-radius: 50%;
}

.social-icons a:hover {
    color: black;
    transform: translateY(-5px) scale(1.2);
    background: rgba(255,255,255,0.2);
} 

/* Overlay */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
}

.show-overlay {
    opacity: 1;
    visibility: visible;
}  

/* Responsive Design */
@media screen and (min-width: 768px) {
    .sidebar {
        width: 400px;
        padding: 3rem;
    }
    
    .sidebar-toggle {
        right: 5rem;
    }
}

@media screen and (max-width: 480px) {
    .sidebar {
        padding: 1.5rem;
    }
    
    .links a {
        font-size: 1.5rem;
        padding: 1.2rem 1.5rem;
    }
}
    </style>

</head>
<body>
    <button class="sidebar-toggle">
        <i class="fa-duotone fa-solid fa-bars"></i>
    </button>
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="download.jfif" class="logo" alt="">
            <button class="close-btn">
                <i class="fa-solid fa-circle-xmark"></i>
            </button>
        </div>
         <ul class="links">
                <li>
                    <a href="index.html">home</a>
                </li>
                <li>
                    <a href="about.html">about</a>
                </li>
                <li>
                    <a href="project.html">projects</a>
                </li>
                <li>
                    <a href="contect.html">contect</a>
                </li>
            </ul>
            <!-- social -->
            <ul class="social-icons">
                <li>
                    <a href="https://www.twitter.com">
                        <i class="fa-brands fa-facebook"></i>
                    </a>
                </li>
                <li>
                    <a href="https://www.twitter.com">
                        <i class="fa-brands fa-linkedin"></i>
                    </a>
                </li>
                <li>
                    <a href="https://www.twitter.com">
                        <i class="fa-brands fa-google"></i>
                    </a>
                </li>
            </ul>
    </aside>

    <script>
        const toggleBtn = document.querySelector('.sidebar-toggle');
const closeBtn = document.querySelector('.close-btn');
const sidebar = document.querySelector('.sidebar');

toggleBtn.addEventListener('click', function (){
    // console.log(sidebar.classList);
    // if (sidebar.classList.contains("show-sidebar")){
    //     sidebar.classList.remove("show-sidebar");
    // }else{
    //     sidebar.classList.add("show-sidebar");
    // }
    sidebar.classList.toggle("show-sidebar");
});
closeBtn.addEventListener('click', function(){
    sidebar.classList.remove("show-sidebar");
})



    </script>

</body>
</html>
