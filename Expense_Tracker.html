<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker</title>
  <style>
    body {
  font-family: Arial;
  background: #f4f4f4;
}

.container {
  width: 300px;
  margin: 50px auto;
  background: white;
  padding: 20px;
  border-radius: 8px;
}

input, button {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

li {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

.plus {
  color: green;
}

.minus {
  color: red;
}
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Expense Tracker</h2>

    <h3>Balance: ₹<span id="balance">0</span></h3>

    <form id="form">
      <input type="text" id="text" placeholder="Enter income / expense" required>
      <input type="number" id="amount" placeholder="Enter amount (+income / -expense)" required>
      <button>Add</button>
    </form>

    <ul id="list"></ul>
  </div>

  <script>const balance = document.getElementById("balance");
const list = document.getElementById("list");
const form = document.getElementById("form");
const text = document.getElementById("text");
const amount = document.getElementById("amount");

let transactions = [];

form.addEventListener("submit", addTransaction);

function addTransaction(e) {
  e.preventDefault();

  const transaction = {
    id: Date.now(),
    text: text.value,
    amount: +amount.value
  };

  transactions.push(transaction);
  addTransactionDOM(transaction);
  updateBalance();

  text.value = "";
  amount.value = "";
}

function addTransactionDOM(transaction) {
  const sign = transaction.amount < 0 ? "-" : "+";
  const item = document.createElement("li");

  item.classList.add(transaction.amount < 0 ? "minus" : "plus");

  item.innerHTML = `
    ${transaction.text}
    <span>${sign}₹${Math.abs(transaction.amount)}</span>
  `;

  list.appendChild(item);
}

function updateBalance() {
  const amounts = transactions.map(t => t.amount);
  const total = amounts.reduce((acc, item) => acc + item, 0);
  balance.innerText = total;
}    </script>
</body>
</html>
