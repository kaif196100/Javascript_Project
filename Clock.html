<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
      *{
    margin: 0;
    padding: 0;
}
body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgb(216, 203, 203);

}
.gift-img {
    margin-bottom: 2rem;
}
.gift-info h3{
    text-transform: uppercase;
    color: #4a6e94;
}
.gift-info p{
    color: gray;
}
.date{
    color: gray;
    font-size: 0.85rem;
}
@media screen and (min-width: 992px){
    .section-center {
        display: flex;
        grid-template-columns: 1fr 1fr;
        place-items: center;
        gap: 3rem;
        width: 96vw;
    }
    .gift-img{
        margin-bottom: 0;
    }
}
.gift-info p{
    margin: 2rem 0;
}
.deadline{
    display: flex;
}
.deadline-format{
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    background: rgb(41, 40, 40);
    color: rgb(199, 191, 146);
    margin-right: 1rem;
    width: 5rem;
    height: 5rem;
    display: grid;
    place-items: center;
    text-align: center;
    border-radius: 10%;
    padding: 2rem;
}
.deadline-format span {
    display: block;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 0.85rem;
}
.deadline h4:not(.expired){
    font-size: 2rem;
    margin-bottom: 0.25rem;
    letter-spacing: 0.25rem;
}
    </style>
    
</head>

<body>
    <section class="section-center">
        <!-- image -->
        <article class="gift-img">
            <img src="images (1).jfif" alt="gift picture">
        </article>
        <article class="gift-info">
            <h3>Old iphone giveaway</h3>
            <h4 class="giveaway">
                giveaway endds on sunday, 24 April 2026, 8:00am
            </h4>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Et doloremque cupiditate aut laudantium nobis
                nam perspiciatis earum dicta eaque impedit?
            </p>
            <div class="deadline">
                <!-- days -->
                <div class="deadline-format">
                   <div>
                    <h4 class="days">34</h4>
                    <span>days</span>
                </div>
               </div>
               <!-- end of item -->
                <!-- hours -->
                <div class="deadline-format">
                   <div>
                    <h4 class="hours">34</h4>
                    <span>hours</span>
                </div>
               </div>
               <!-- end of item -->
                <!-- mins -->
                <div class="deadline-format">
                   <div>
                    <h4 class="mins">34</h4>
                    <span>mins</span>
                </div>
                </div>
                <!-- end of item -->
                <!-- sec -->
                <div class="deadline-format">
                   <div>
                    <h4 class="sec">34</h4>
                    <span>sec</span>
                </div>
               </div>
               <!-- end of item -->
              
            </div>
        </article>
    </section>
    <script>
        const months = [
  'January',
  'February',
  'March',
  'April',
  'May',
  'June',
  'July',
  'August',
  'September',
  'October',
  'November',
  'December',
];
const weekdays = [
  'Sunday',
  'Monday',
  'Tuesday',
  'Wednesday',
  'Thursday',
  'Friday',
  'Saturday',
];
const giveaway = document.querySelector('.giveaway');
const deadline = document.querySelector('.deadline');
const items = document.querySelectorAll('.deadline-format h4');

let tempDate = new Date();
let tempYear = tempDate.getFullYear();
let tempMonth = tempDate.getMonth();
let tempDay = tempDate.getDate();
// months are ZERO index based;
const futureDate = new Date(tempYear, tempMonth, tempDay + 10, 11, 30, 0);

// let futureDate = new Date(2020, 3, 24, 11, 30, 0);

const year = futureDate.getFullYear();
const hours = futureDate.getHours();
const minutes = futureDate.getMinutes();

let month = futureDate.getMonth();
month = months[month];
const weekday = weekdays[futureDate.getDay()];
const date = futureDate.getDate();
giveaway.textContent = `giveaway ends on ${weekday}, ${date} ${month} ${year} ${hours}:${minutes}am`;

const futureTime = futureDate.getTime();
function getRemaindingTime() {
  const today = new Date().getTime();

  const t = futureTime - today;
  // 1s = 1000ms
  // 1m = 60s
  // 1hr = 60m
  // 1d = 24hr
  // values in miliseconds
  const oneDay = 24 * 60 * 60 * 1000;
  const oneHour = 60 * 60 * 1000;
  const oneMinute = 60 * 1000;
  // calculate all values
  let days = t / oneDay;
  days = Math.floor(days);
  let hours = Math.floor((t % oneDay) / oneHour);
  let minutes = Math.floor((t % oneHour) / oneMinute);
  let seconds = Math.floor((t % oneMinute) / 1000);

  // set values array
  const values = [days, hours, minutes, seconds];
  function format(item) {
    if (item < 10) {
      return (item = `0${item}`);
    }
    return item;
  }

  items.forEach(function (item, index) {
    item.innerHTML = format(values[index]);
  });

  if (t < 0) {
    clearInterval(countdown);
    deadline.innerHTML = `<h4 class="expired">sorry, this giveaway has expired!</h4>`;
  }
}
// countdown;
let countdown = setInterval(getRemaindingTime, 1000);
//set initial values
getRemaindingTime();
    </script>
</body>

</html>
