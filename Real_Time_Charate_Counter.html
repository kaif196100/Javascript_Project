<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charate Counter</title>
    <style>
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            align-items: center;
            background-color: rgb(143, 248, 248);
            font-family: cursive;
        }

        .container{
            background-color: rgb(205, 238, 238);
            width: 400px;
            padding: 20px;
            margin: 5px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .textarea{
            resize: none;
            width: 100%;
            height: 100px;
            font-size: 18px;
            font-family: sans-serif;
            padding: 10px;
            box-sizing: border-box;
            border-radius: solid 2px darkgray;
        }
        .counter-container{
            display: flex;
            justify-content: center;
            padding: 0 5px;
        }
        .counter-container p{
            font-size: 18px;
            color: gray;
        }
        .total-counter{
            color: slateblue;
        }
        .remaining-counter{
            color: orangered;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Real Time Charater Counter</h2>
        <textarea id="textarea" class="textarea" placeholder="Please writh your text here..." 
        maxlength="50"></textarea>
        <div class="counter-container">
            <p>Total Charaters: <span class="total-counter" 
                id="total-counter">30</span></p>
            <p>Remaining: <span class="Remaining-counter" 
                id="Remaining-counter">20</span></p>
        </div>
    </div>

    <script>
        const textareaEl = document.getElementById("textarea")

        const totalCounterEl = document.getElementById("total-counter")

        const remainingCounterEl = document.getElementById("Remaining-counter")

        textareaEl.addEventListener("keyup", ()=>{
            updateCounter()
        });

        updateCounter()


        function updateConter(){
           totalCounterEl.innerText = textareaEl.value.length;
           textareaEl.getAttribute("maxLength") - textareaEl.value.length ;
        }
    </script>
</body>
</html>
