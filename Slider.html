<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <style>
       *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.slider-container{
    border: 2px solid #4a6e94;
    width: 40vw;
    height: 20vw;
    margin: 0;
    max-width: 1170px;
    position: relative;
    border-radius: 0.5rem;
    overflow: hidden;
    margin-top: 4rem;
    display: flex;
    flex-direction: column;
}
.slider{
    position: absolute;
    width: 100%;
    height: 100%;
    background: whitesmoke;
    color: black;
    place-items: center;
    transition: all 0.3s linear;
    text-align: center;
}
.slider-img{
    height: 100%;
    object-fit: cover;
}
.slider h1{
    font-size: 5rem;
}
.person-img{
    border-radius: 50%;
    width: 6rem;
    height: 6rem;
    margin: 0 auto;
    margin-bottom: 1rem;
}
.slide:nth-child(1) h1{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
} 

.btn-container{
    display: flex;
    justify-content: center;
    margin-top: 0.75rem;
}
.prevBtn, .nextBtn{
    background: transparent;
    border-radius: 5px;
    font-size: 1rem;
    text-transform: capitalize;
    cursor: pointer;
    margin: 0 0.25rem;
    padding: 5px 10px;
    transition: all 0.3s linear
}
.nextBtn:hover, .prevBtn:hover{
    color: gray;
}
 
    </style>
</head>

<body>
    <div class="slider-container">
        <div class="slider">
            <img src="download (4).jfif" alt="" class="slider-img">
            <h1>1</h1>
        </div>
        <div class="slider">
            <img src="img-1.jpeg" alt="" class="slider-img">
            <h1>2</h1>
        </div>
        <div class="slider">
            <img src="img-2.jpeg" alt="" class="slider-img">
            <h1>3</h1>
        </div>
        <div class="slider">
            <div>
                <img src="" alt="" class="person-img">
                <h4>text</h4>
                <h1>4</h1>
            </div>
        </div>
    </div>
    <div class="btn-container">
        <button type="button" class="prevBtn">prev</button>
        <button type="button" class="nextBtn">next</button>
    </div>


    <script>
        const slides = document.querySelectorAll('.slider');
const nextBtn = document.querySelector('.nextBtn');
const prevBtn = document.querySelector('.prevBtn');

slides.forEach(function(slide, index){
slide.style.left = `${index * 100}%`
});
let counter = 0;
nextBtn.addEventListener('click',function(){
    counter++;
    carousel();
});
prevBtn.addEventListener('click',function(){
    counter--;
    carousel();
});

function carousel(){
    //working with slides

   //if (counter === slides.length){
   //counter = 0;
// }
// if (counter < 0 ){
//     counter = slides.length - 1;
// }
// working with buttons
if(counter < slides.length - 1){
    nextBtn.style.display = 'block'
}else{
    nextBtn.style.display = "none"
}
if(counter > 0){
    prevBtn.style.display = "block"
}else{
    prevBtn.style.dispaly = "none"
}
    slides.forEach(function(slide){
        slide.style.transform = `translateX(-${counter * 100}%)`
    })
}
prevBtn.style.display = "none";
    </script>
</body>

</html>
