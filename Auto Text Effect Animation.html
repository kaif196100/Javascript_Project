<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Text Effect Animation</title>
    <style>
       body{
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: salmon;
        font-family: cursive;
       }
    </style>
</head>
<body>
    <div class="container">
        
    </div>

    <script>
        const containerEl = document.querySelector(".container");

        const careers = ["YouTube", "Web Developer", "Freelancer" ,"Instructor"];

        let careerIndex = 0;

        let characterIndex = 0;
        
        updateText();

        function updateText(){
            characterIndex++
            containerEl.innerHTML = `<h1> I Am ${careers[careerIndex].slice(0,1) === "I" ? "An" : "a"} ${careers[careerIndex].slice(0,characterIndex)}</h1>`;
            
            if(characterIndex === careers[careerIndex].length){
                careerIndex++
                characterIndex = 0;
            }
            if(careerIndex === careers.length){
                careerIndex = 0;
            }
            setTimeout(updateText, 400)
        }

       

    </script>
</body>
</html>
